version: '3.8'

services:
  # ── FreightConnect App (backend + frontend static) ─────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freightconnect-app
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/freightconnect
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - uploads:/app/public/documents/uploads
    networks:
      - freightconnect
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: freightconnect-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: freightconnect
    networks:
      - freightconnect
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    # To enable authentication, uncomment below and set MONGO_URI accordingly:
    # environment:
    #   MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
    #   MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-changeme}

volumes:
  mongo-data:
    driver: local
  uploads:
    driver: local

networks:
  freightconnect:
    driver: bridge
