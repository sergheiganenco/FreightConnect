# ============================================================================
# FreightConnect — Render.com Blueprint (render.yaml)
# ============================================================================
# Deploy: connect your GitHub repo and Render auto-detects this file.
# Docs:   https://render.com/docs/blueprint-spec
# ============================================================================

services:
  # ── Web Service (Node.js backend + React frontend) ────────────────────────
  - type: web
    name: freightconnect
    runtime: node
    region: virginia   # co-located with the Atlas cluster (Azure eastus2 / Virginia) to minimize DB latency
    plan: starter   # $7/mo — fine for the pilot; bump to standard when traffic grows
    buildCommand: |
      cd frontend && npm ci && npm run build && cd ../backend && npm ci --omit=dev
    startCommand: |
      cd backend && node app.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22.13.0"   # match the Node/npm that generated package-lock.json; npm 11 (Node 24) resolves extra transitive deps and breaks `npm ci`. Also avoids CRA-on-Node24 build breakage.
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: MONGO_URI
        sync: false    # set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: TRACKING_TOKEN_SECRET
        generateValue: true   # HMAC key for OwnTracks/Traccar per-load GPS tokens
      - key: JWT_EXPIRES_IN
        value: "1d"
      - key: RATE_LIMIT_MAX
        value: "300"          # req/min per IP — dashboards poll; 100 is tight for pilots
      - key: ALLOWED_ORIGINS
        sync: false    # set to your Render URL, e.g. https://freightconnect.onrender.com
      - key: REACT_APP_TOMTOM_TRAFFIC_KEY
        sync: false    # OPTIONAL: paste a free key from developer.tomtom.com to light up the
                       # carrier Live Map "Traffic" overlay. Build-time (CRA) — redeploy after setting.
      - key: ORS_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: FMCSA_API_KEY
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
    # Render auto-detects the root; buildCommand handles both dirs.
    # The frontend build is at ../frontend/build, served by Express in production.
    # Mount the PARENT documents dir so uploads, receipts, AND dispute evidence
    # all persist across deploys (a narrower mount silently loses the others).
    disk:
      name: documents
      mountPath: /app/backend/public/documents
      sizeGB: 1
